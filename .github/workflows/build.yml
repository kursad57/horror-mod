name: Build Horror Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 8.5
    
    - name: Copy mod sources to MDK structure
      run: |
        mkdir -p mdk/src/main/java
        mkdir -p mdk/src/main/resources
        cp -r src/main/java/* mdk/src/main/java/
        cp -r src/main/resources/* mdk/src/main/resources/
    
    - name: Build with Gradle
      working-directory: mdk
      run: |
        chmod +x gradlew
        ./gradlew --no-daemon build -x test
    
    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: Horror Mod JAR
        path: mdk/build/libs/horrormod-*.jar
